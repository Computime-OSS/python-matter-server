# project identification
sonar.host.url=https://sonarcloud.io
sonar.projectKey=Computime-OSS_python-matter-server
sonar.projectName=python-matter-server
sonar.organization=computime-oss
sonar.projectVersion=1.0.0

# source layout
sonar.sources=matter_server
sonar.tests=tests
sonar.sourceEncoding=UTF-8
sonar.python.version=3.12,3.13

# Coverage report
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions — non-code or generated
sonar.exclusions=**/.venv/**,\
  **/__pycache__/**,\
  **/*.pyc,\
  dashboard/**,\
  docs/**,\
  scripts/**
sonar.coverage.exclusions=**/tests/**
